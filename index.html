<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drei Mann – Trinkspiel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Barlow:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --stout:#160C05;          /* dunkles Stout */
  --wood:#241207;
  --card:#2E1A0C;
  --card-line:#4A2D14;
  --foam:#FFF6E0;           /* Schaum */
  --foam-dim:#CBB794;
  --beer:#F5A623;           /* Bier-Gold */
  --beer-deep:#C97E12;
  --red:#D64533;
  --ink:#241E17;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Barlow',sans-serif;
  color:var(--foam);
  min-height:100vh;
  padding-bottom:70px;
  background:
    radial-gradient(ellipse 120% 60% at 50% 0%, #3A1E0C 0%, var(--wood) 45%, var(--stout) 100%);
  overflow-x:hidden;
}

/* ---------- Bier-Bläschen im Hintergrund ---------- */
.bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bubble{
  position:absolute;bottom:-60px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, rgba(255,246,224,.55), rgba(245,166,35,.18) 60%, transparent 75%);
  animation:rise linear infinite;
  opacity:0;
}
@keyframes rise{
  0%{transform:translateY(0) translateX(0);opacity:0}
  8%{opacity:.7}
  90%{opacity:.5}
  100%{transform:translateY(-110vh) translateX(24px);opacity:0}
}
.wrap{max-width:520px;margin:0 auto;padding:0 16px;position:relative;z-index:1}

/* ---------- Kopf mit Schaumkrone ---------- */
header{padding:30px 0 8px;text-align:center;position:relative}
.krug{font-size:34px;display:inline-block;transform:rotate(-8deg);filter:drop-shadow(0 3px 4px rgba(0,0,0,.5))}
.krug.r{transform:rotate(8deg) scaleX(-1)}
.stamp{
  display:inline-block;
  font-family:'Alfa Slab One',serif;
  font-size:clamp(36px,10vw,50px);
  line-height:1;
  color:var(--foam);
  padding:6px 14px 4px;
  transform:rotate(-2deg);
  letter-spacing:1px;
  text-shadow:0 4px 0 rgba(0,0,0,.45), 0 0 30px rgba(245,166,35,.35);
  margin:0 6px;
}
.stamp span{
  color:var(--beer);
  background:linear-gradient(180deg, var(--foam) -20%, var(--beer) 35%, var(--beer-deep) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
header p{margin-top:8px;color:var(--foam-dim);font-size:13px;letter-spacing:2.5px;text-transform:uppercase}

/* ---------- Würfel-Bühne ---------- */
.stage{
  background:linear-gradient(180deg, rgba(255,246,224,.05), rgba(0,0,0,.35));
  border:1px solid var(--card-line);
  border-radius:var(--radius);
  padding:22px 16px 18px;
  margin-top:16px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,246,224,.08);
}
.dice{display:flex;justify-content:center;gap:22px;min-height:92px}
.die{
  width:86px;height:86px;
  background:linear-gradient(160deg, #FFFDF6 0%, #EFE4C8 100%);
  border-radius:18px;
  box-shadow:inset 0 -6px 0 rgba(0,0,0,.14), 0 8px 16px rgba(0,0,0,.5);
  display:grid;
  grid-template:repeat(3,1fr)/repeat(3,1fr);
  padding:13px;
}
.die.rolling{animation:tumble .5s ease}
@keyframes tumble{
  0%{transform:rotate(0) translateY(0)}
  30%{transform:rotate(160deg) translateY(-16px)}
  60%{transform:rotate(300deg) translateY(5px)}
  100%{transform:rotate(360deg) translateY(0)}
}
.pip{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.pip i{width:13px;height:13px;background:var(--ink);border-radius:50%}
.die[data-v="3"] .pip i{background:var(--red)}

.turn{margin-top:16px;font-size:15px;color:var(--foam-dim)}
.turn b{color:var(--beer);font-size:19px}
.turn .again{display:block;font-size:13px;color:var(--foam-dim);margin-top:2px}

.btn{
  font-family:'Barlow',sans-serif;font-weight:800;
  font-size:19px;letter-spacing:.5px;text-transform:uppercase;
  border:none;border-radius:14px;cursor:pointer;
  padding:15px 22px;margin-top:14px;
  transition:transform .06s, filter .15s;
}
.btn:active{transform:translateY(2px)}
.btn-roll{
  background:linear-gradient(180deg, #FFC85C 0%, var(--beer) 45%, var(--beer-deep) 100%);
  color:var(--ink);
  box-shadow:0 5px 0 #7d4e0a, 0 8px 20px rgba(245,166,35,.35);
  width:100%;
}
.btn-ghost{background:transparent;color:var(--foam-dim);border:2px solid var(--card-line);font-size:14px;padding:10px 16px}
.btn-red{background:var(--red);color:var(--foam);box-shadow:0 4px 0 #7e241c}
.btn:disabled{filter:grayscale(.7) brightness(.6);cursor:not-allowed;box-shadow:none}

/* ---------- Ereignisse ---------- */
.events{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.event{
  background:var(--foam);color:var(--ink);
  border-radius:12px;padding:11px 14px;
  font-weight:600;font-size:15px;text-align:left;
  border-left:6px solid var(--beer);
  animation:pop .25s ease;
}
.event.drei{border-left-color:var(--red)}
.event.calm{background:rgba(255,246,224,.12);color:var(--foam-dim);border-left-color:var(--card-line)}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}

/* ---------- Verteilen ---------- */
.dist{
  margin-top:14px;background:var(--foam);color:var(--ink);
  border-radius:var(--radius);padding:16px;text-align:left;
}
.dist h3{font-family:'Alfa Slab One',serif;font-size:18px;margin-bottom:4px}
.dist p{font-size:14px;margin-bottom:10px}
.dist-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px dashed #CBB794}
.dist-row:last-of-type{border-bottom:none}
.dist-ctrl{display:flex;align-items:center;gap:12px}
.dist-ctrl button{
  width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;
  font-size:20px;font-weight:800;background:var(--wood);color:var(--foam);
}
.dist-ctrl button:disabled{opacity:.3;cursor:not-allowed}
.dist-ctrl span{min-width:20px;text-align:center;font-weight:800;font-size:18px}

/* ---------- Spieler ---------- */
section{margin-top:24px}
h2{
  font-family:'Alfa Slab One',serif;font-size:16px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--foam-dim);
  display:flex;align-items:center;gap:10px;margin-bottom:10px;
}
h2::after{content:"";flex:1;height:2px;background:var(--card-line)}
.player{
  display:flex;align-items:center;gap:12px;
  background:var(--card);border:1px solid var(--card-line);
  border-radius:14px;padding:13px 14px;margin-bottom:8px;
}
.player.active{
  border-color:var(--beer);
  background:linear-gradient(90deg, rgba(245,166,35,.16), var(--card) 70%);
  box-shadow:0 0 18px rgba(245,166,35,.15);
}
.player .name{font-weight:600;font-size:17px;flex:1}
.player .sips{
  font-family:'Alfa Slab One',serif;font-size:23px;color:var(--beer);
  min-width:44px;text-align:right;
}
.player .sips small{font-family:'Barlow';font-size:10px;display:block;color:var(--foam-dim);text-transform:uppercase;letter-spacing:1px}
.badge3{
  font-family:'Alfa Slab One',serif;
  background:var(--red);color:var(--foam);
  font-size:13px;padding:4px 9px;border-radius:8px;
  transform:rotate(-4deg);
  box-shadow:0 2px 0 rgba(0,0,0,.35);
  animation:pop .3s ease;
}
.remove{background:none;border:none;color:var(--foam-dim);cursor:pointer;font-size:18px;padding:4px 6px}

/* ---------- Statistik ---------- */
table{width:100%;border-collapse:collapse;font-size:15px}
th{text-align:left;color:var(--foam-dim);font-size:12px;text-transform:uppercase;letter-spacing:1px;padding:6px 4px;border-bottom:2px solid var(--card-line)}
td{padding:9px 4px;border-bottom:1px solid rgba(255,246,224,.08)}
td.num{text-align:right;font-weight:800}
td.num.amber{color:var(--beer)}
.bar{height:9px;background:var(--card-line);border-radius:5px;overflow:hidden;margin-top:5px}
.bar i{display:block;height:100%;background:linear-gradient(90deg, var(--beer-deep), var(--beer))}

/* ---------- Log & Setup ---------- */
.log{list-style:none;font-size:13px;color:var(--foam-dim)}
.log li{padding:5px 0;border-bottom:1px dashed rgba(255,246,224,.08)}
.add-row{display:flex;gap:8px;margin-bottom:10px}
.add-row input{
  flex:1;padding:12px 14px;border-radius:12px;border:2px solid var(--card-line);
  background:rgba(0,0,0,.3);color:var(--foam);font-size:16px;font-family:'Barlow';
}
.add-row input::placeholder{color:var(--foam-dim)}
.add-row .btn{margin-top:0}
.hint{font-size:13px;color:var(--foam-dim);margin-top:6px}
.footer-btns{margin-top:28px;display:flex;gap:10px;flex-wrap:wrap}
@media (prefers-reduced-motion: reduce){
  .die.rolling,.event,.badge3{animation:none}
  .bubble{display:none}
}
</style>
</head>
<body>
<div class="bubbles" id="bubbles"></div>
<div class="wrap">
  <header>
    <span class="krug">🍺</span><div class="stamp">DREI <span>MANN</span></div><span class="krug r">🍺</span>
    <p>Würfeln bis nichts mehr passiert</p>
  </header>

  <!-- Würfel-Bühne -->
  <div class="stage">
    <div class="dice">
      <div class="die" id="die1"></div>
      <div class="die" id="die2"></div>
    </div>
    <div class="turn" id="turnInfo"></div>
    <button class="btn btn-roll" id="rollBtn">Würfeln</button>
    <div class="events" id="events"></div>
    <div id="distPanel"></div>
  </div>

  <!-- Spieler -->
  <section>
    <h2>Spieler</h2>
    <div id="playerList"></div>
    <div class="add-row">
      <input type="text" id="nameInput" placeholder="Name…" maxlength="20">
      <button class="btn btn-ghost" id="addBtn">+ Dazu</button>
    </div>
    <p class="hint">Mindestens 2 Spieler. Reihenfolge = Sitzordnung (für 7er / 9er).</p>
  </section>

  <!-- Statistik -->
  <section>
    <h2>Statistik</h2>
    <table>
      <thead>
        <tr><th>Spieler</th><th style="text-align:right">Schlücke</th><th style="text-align:right">Würfe</th><th style="text-align:right">3-Mann</th></tr>
      </thead>
      <tbody id="statsBody"></tbody>
    </table>
  </section>

  <!-- Verlauf -->
  <section>
    <h2>Verlauf</h2>
    <ul class="log" id="log"></ul>
  </section>

  <div class="footer-btns">
    <button class="btn btn-ghost" id="resetStats">Statistik zurücksetzen</button>
    <button class="btn btn-ghost" id="resetAll">Alles zurücksetzen</button>
  </div>
</div>

<script>
"use strict";

// ---------- Bläschen erzeugen ----------
(function makeBubbles(){
  const box = document.getElementById("bubbles");
  for(let i = 0; i < 22; i++){
    const b = document.createElement("div");
    b.className = "bubble";
    const size = 6 + Math.random() * 22;
    b.style.width = b.style.height = size + "px";
    b.style.left = Math.random() * 100 + "%";
    b.style.animationDuration = (7 + Math.random() * 10) + "s";
    b.style.animationDelay = (Math.random() * 12) + "s";
    box.appendChild(b);
  }
})();

// ---------- Zustand ----------
let state = {
  players: [],          // {id, name, sips, rolls, dreiCount}
  turn: 0,
  dreiManId: null,
  log: [],
  nextId: 1
};
let pendingDist = null;   // {total, remaining, alloc}
let busy = false;         // während Animation / Auto-Wechsel

// ---------- Persistenz ----------
function save(){ try{ localStorage.setItem("dreimann", JSON.stringify(state)); }catch(e){} }
function load(){ try{ const r = localStorage.getItem("dreimann"); if(r) state = JSON.parse(r); }catch(e){} }

// ---------- Hilfen ----------
const $ = id => document.getElementById(id);
const byId = id => state.players.find(p => p.id === id);
function addLog(text){ state.log.unshift(text); state.log = state.log.slice(0, 12); }
function drink(player, n, reason){
  player.sips += n;
  addLog(player.name + " trinkt " + n + (n === 1 ? " Schluck" : " Schlücke") + " (" + reason + ")");
}
function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// ---------- Würfel rendern ----------
const PIPS = {1:[4],2:[0,8],3:[0,4,8],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
function renderDie(el, v){
  el.dataset.v = v || "";
  el.innerHTML = "";
  for(let i = 0; i < 9; i++){
    const c = document.createElement("div");
    c.className = "pip";
    if(v && PIPS[v].includes(i)) c.innerHTML = "<i></i>";
    el.appendChild(c);
  }
}

// ---------- UI rendern ----------
function render(){
  const n = state.players.length;
  if(state.turn >= n) state.turn = 0;

  if(n >= 2){
    const cur = state.players[state.turn];
    $("turnInfo").innerHTML = "Am Zug: <b>" + esc(cur.name) + "</b>";
    $("rollBtn").disabled = !!pendingDist || busy;
  }else{
    $("turnInfo").textContent = "Füge mindestens 2 Spieler hinzu.";
    $("rollBtn").disabled = true;
  }

  $("playerList").innerHTML = state.players.map((p, i) =>
    '<div class="player' + (i === state.turn && n >= 2 ? ' active' : '') + '">' +
      '<span class="name">' + esc(p.name) + '</span>' +
      (p.id === state.dreiManId ? '<span class="badge3">3-MANN</span>' : '') +
      '<span class="sips">' + p.sips + '<small>Schlücke</small></span>' +
      '<button class="remove" data-del="' + p.id + '" title="Entfernen">✕</button>' +
    '</div>'
  ).join("");

  const max = Math.max(1, ...state.players.map(p => p.sips));
  const sorted = [...state.players].sort((a, b) => b.sips - a.sips);
  $("statsBody").innerHTML = sorted.map(p =>
    "<tr><td>" + esc(p.name) +
    '<div class="bar"><i style="width:' + Math.round(p.sips / max * 100) + '%"></i></div></td>' +
    '<td class="num amber">' + p.sips + "</td>" +
    '<td class="num">' + p.rolls + "</td>" +
    '<td class="num">' + p.dreiCount + "</td></tr>"
  ).join("");

  $("log").innerHTML = state.log.map(l => "<li>" + esc(l) + "</li>").join("");
  save();
}

// ---------- Wurf ----------
function roll(){
  if(state.players.length < 2 || pendingDist || busy) return;
  busy = true;
  render();
  const a = 1 + Math.floor(Math.random() * 6);
  const b = 1 + Math.floor(Math.random() * 6);
  const d1 = $("die1"), d2 = $("die2");
  d1.classList.remove("rolling"); d2.classList.remove("rolling");
  void d1.offsetWidth;
  d1.classList.add("rolling"); d2.classList.add("rolling");
  setTimeout(() => { renderDie(d1, a); renderDie(d2, b); resolve(a, b); }, 480);
}

function resolve(a, b){
  const n = state.players.length;
  const roller = state.players[state.turn];
  roller.rolls++;
  const sum = a + b;
  const events = [];
  addLog(roller.name + " würfelt " + a + " + " + b);
  let hadAction = false;

  // 1 + 2 → neuer 3-Mann
  if((a === 1 && b === 2) || (a === 2 && b === 1)){
    state.dreiManId = roller.id;
    roller.dreiCount++;
    events.push({t: esc(roller.name) + " ist der neue <b>3-Mann</b>!", drei: true});
    addLog(roller.name + " ist neuer 3-Mann");
    hadAction = true;
  }

  // Dreien → 3-Mann trinkt pro Drei
  const threes = (a === 3 ? 1 : 0) + (b === 3 ? 1 : 0);
  if(threes > 0){
    const dm = byId(state.dreiManId);
    if(dm){
      drink(dm, threes, threes + "× Drei");
      events.push({t: "3-Mann " + esc(dm.name) + " trinkt <b>" + threes + "</b> (" + threes + "× Drei)", drei: true});
      hadAction = true;
    }
  }

  // Summen
  if(sum === 7){
    const prev = state.players[(state.turn - 1 + n) % n];
    drink(prev, 1, "Sieben");
    events.push({t: "Sieben! <b>" + esc(prev.name) + "</b> (davor) trinkt 1"});
    hadAction = true;
  }
  if(sum === 9){
    const next = state.players[(state.turn + 1) % n];
    drink(next, 1, "Neun");
    events.push({t: "Neun! <b>" + esc(next.name) + "</b> (danach) trinkt 1"});
    hadAction = true;
  }
  if(sum === 10){
    state.players.forEach(p => p.sips += 1);
    addLog("Alle trinken 1 (Zehn)");
    events.push({t: "Zehn! <b>Alle trinken 1</b>"});
    hadAction = true;
  }

  // Pasch → Augenzahl verteilen
  if(a === b){
    pendingDist = {total: a, remaining: a, alloc: {}};
    events.push({t: "Pasch! " + esc(roller.name) + " verteilt <b>" + a + " Schlücke</b>"});
    hadAction = true;
  }

  if(hadAction){
    showEvents(events, false);
    if(!pendingDist){
      $("turnInfo").innerHTML = "Am Zug: <b>" + esc(roller.name) + "</b><span class=\"again\">Aktion! Nochmal würfeln 🎲</span>";
    }
    busy = false;
    renderDistPanel();
    render();
    if(!pendingDist){
      $("turnInfo").innerHTML = "Am Zug: <b>" + esc(roller.name) + "</b><span class=\"again\">Aktion! Nochmal würfeln 🎲</span>";
    }
  }else{
    // Nichts passiert → automatisch weiter
    showEvents([{t: "Nichts passiert (" + a + "+" + b + " = " + sum + "). Weiter geht's…", calm: true}], true);
    renderDistPanel();
    render();
    setTimeout(() => {
      state.turn = (state.turn + 1) % state.players.length;
      busy = false;
      render();
      const cur = state.players[state.turn];
      $("turnInfo").innerHTML = "Am Zug: <b>" + esc(cur.name) + "</b><span class=\"again\">Du bist dran!</span>";
    }, 1400);
  }
}

function showEvents(events, calmOnly){
  $("events").innerHTML = events.map(e =>
    '<div class="event' + (e.drei ? ' drei' : '') + (e.calm ? ' calm' : '') + '">' + e.t + "</div>"
  ).join("");
}

// ---------- Pasch verteilen ----------
function renderDistPanel(){
  const el = $("distPanel");
  if(!pendingDist){ el.innerHTML = ""; return; }
  const roller = state.players[state.turn];
  el.innerHTML =
    '<div class="dist">' +
      "<h3>" + pendingDist.total + " Schlücke verteilen</h3>" +
      "<p>" + esc(roller.name) + ", noch <b>" + pendingDist.remaining + "</b> übrig:</p>" +
      state.players.map(p => {
        const v = pendingDist.alloc[p.id] || 0;
        return '<div class="dist-row"><span>' + esc(p.name) + "</span>" +
          '<div class="dist-ctrl">' +
            '<button data-minus="' + p.id + '"' + (v === 0 ? " disabled" : "") + ">−</button>" +
            "<span>" + v + "</span>" +
            '<button data-plus="' + p.id + '"' + (pendingDist.remaining === 0 ? " disabled" : "") + ">+</button>" +
          "</div></div>";
      }).join("") +
      '<button class="btn btn-red" id="distDone" style="width:100%"' +
        (pendingDist.remaining > 0 ? " disabled" : "") + ">Prost! 🍻</button>" +
    "</div>";
}

function distClick(e){
  if(!pendingDist) return;
  const plus = e.target.dataset.plus, minus = e.target.dataset.minus;
  if(plus && pendingDist.remaining > 0){
    pendingDist.alloc[plus] = (pendingDist.alloc[plus] || 0) + 1;
    pendingDist.remaining--;
  }
  if(minus && (pendingDist.alloc[minus] || 0) > 0){
    pendingDist.alloc[minus]--;
    pendingDist.remaining++;
  }
  if(e.target.id === "distDone" && pendingDist.remaining === 0){
    const roller = state.players[state.turn];
    for(const [id, num] of Object.entries(pendingDist.alloc)){
      if(num > 0){
        const p = byId(Number(id));
        if(p) drink(p, num, "verteilt von " + roller.name);
      }
    }
    pendingDist = null;
    $("turnInfo").innerHTML = "Am Zug: <b>" + esc(roller.name) + "</b><span class=\"again\">Aktion! Nochmal würfeln 🎲</span>";
  }
  renderDistPanel();
  render();
  if(!pendingDist){
    const roller = state.players[state.turn];
    $("turnInfo").innerHTML = "Am Zug: <b>" + esc(roller.name) + "</b><span class=\"again\">Aktion! Nochmal würfeln 🎲</span>";
  }
}

// ---------- Spielerverwaltung ----------
function addPlayer(){
  const name = $("nameInput").value.trim();
  if(!name) return;
  state.players.push({id: state.nextId++, name, sips: 0, rolls: 0, dreiCount: 0});
  $("nameInput").value = "";
  render();
}
function removePlayer(id){
  const idx = state.players.findIndex(p => p.id === id);
  if(idx < 0) return;
  if(state.dreiManId === id) state.dreiManId = null;
  if(idx < state.turn) state.turn--;
  state.players.splice(idx, 1);
  render();
}

// ---------- Events ----------
$("rollBtn").addEventListener("click", roll);
$("addBtn").addEventListener("click", addPlayer);
$("nameInput").addEventListener("keydown", e => { if(e.key === "Enter") addPlayer(); });
$("playerList").addEventListener("click", e => {
  if(e.target.dataset.del) removePlayer(Number(e.target.dataset.del));
});
$("distPanel").addEventListener("click", distClick);
$("resetStats").addEventListener("click", () => {
  if(!confirm("Alle Schlücke & Würfe auf 0 setzen?")) return;
  state.players.forEach(p => { p.sips = 0; p.rolls = 0; p.dreiCount = 0; });
  state.log = []; state.dreiManId = null; state.turn = 0;
  pendingDist = null; busy = false;
  $("events").innerHTML = ""; renderDistPanel(); render();
});
$("resetAll").addEventListener("click", () => {
  if(!confirm("Wirklich alles löschen (auch Spieler)?")) return;
  state = {players: [], turn: 0, dreiManId: null, log: [], nextId: 1};
  pendingDist = null; busy = false;
  $("events").innerHTML = ""; renderDistPanel(); render();
});

// ---------- Start ----------
load();
renderDie($("die1"), null);
renderDie($("die2"), null);
render();
</script>
</body>
</html>
